name: Generate stack graph

on:
  push:
    paths:
      - 'stack-icons/**'
      - 'scripts/generate_stack_graph.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install Python deps
        run: pip install graphviz

      - name: Generate graph
        run: python scripts/generate_stack_graph.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stack-graph.svg
          git diff --staged --quiet || git commit -m "chore: regenerate stack graph"
          git push